<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Neha Annapureddy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='16' fill='%23C9818A'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia,serif' font-size='18' font-weight='700' fill='white'%3EN%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FDF5F2;
            --primary: #C9818A;
            --primary-light: #E8B4BA;
            --primary-subtle: #F5E6E8;
            --text: #2A1A17;
            --text-muted: #8C6560;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .four-wrap { position: relative; margin-bottom: 32px; }
        .four-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 700;
            color: var(--primary-subtle);
            line-height: 1;
            letter-spacing: -0.04em;
            user-select: none;
        }
        .four-number span { color: var(--primary); }
        .four-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(2.5rem, 8vw, 4rem);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translate(-50%, -50%) translateY(0); }
            50%       { transform: translate(-50%, -50%) translateY(-12px); }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            color: var(--text);
            margin-bottom: 14px;
        }
        p {
            font-size: 1.05rem;
            color: var(--text-muted);
            max-width: 420px;
            line-height: 1.7;
            margin-bottom: 36px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 32px;
            background: var(--primary);
            color: #fff;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #A86169;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(180,100,110,0.3);
        }
        .redirect-note {
            margin-top: 24px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        #countdown { color: var(--primary); font-weight: 600; }
    </style>
</head>
<body>
    <div class="four-wrap">
        <div class="four-number">4<span>0</span>4</div>
        <div class="four-emoji">📊</div>
    </div>
    <h1>This data point doesn't exist</h1>
    <p>Looks like you've landed on a page that's not in the dataset. Let's get you back to the analysis.</p>
    <a href="/" class="btn">← Back to Portfolio</a>
    <p class="redirect-note">Redirecting in <span id="countdown">5</span> seconds…</p>

    <script>
        let n = 5;
        const el = document.getElementById('countdown');
        const timer = setInterval(() => {
            n--;
            el.textContent = n;
            if (n <= 0) { clearInterval(timer); window.location.href = '/'; }
        }, 1000);
    </script>
</body>
</html>
